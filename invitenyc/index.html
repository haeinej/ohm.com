<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>an invitation to wander.</title>

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="an invitation to wander.">
<meta property="og:description" content="your mind caught our attention.">
<meta property="og:image" content="https://www.ohmmmm.com/images/og-invite.png">
<meta property="og:url" content="https://www.ohmmmm.com/invitenyc">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="an invitation to wander.">
<meta name="twitter:description" content="your mind caught our attention.">
<meta name="twitter:image" content="https://www.ohmmmm.com/images/og-invite.png">

<style>
@font-face { font-family: 'Comico'; src: url('../Fonts/OTF/Comico-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }

:root {
  --ink: #0A0A0A;
  --faded: #D0D0D0;
  --muted: rgba(255,255,255,0.25);
  --ember: #C4622D;
  --vermillion: #EB4101;
  --warm-ground: #F5F0EA;
  --type-dark: #1A1A16;
  --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--ink);
  color: var(--faded);
  font-family: 'Sentient', Georgia, serif;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* ─── Grain overlay ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.035;
  background-image: url('../images/grain.png');
  background-size: 120px 120px;
  background-repeat: repeat;
}

/* ═══ STATE 1: Envelope card ═══ */

.scene {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 10;
  transition: opacity 0.8s ease;
}

.scene.hidden {
  opacity: 0;
  pointer-events: none;
}

.wordmark {
  font-family: 'Comico', serif;
  font-size: 28px;
  color: white;
  letter-spacing: -0.03em;
  margin-bottom: 40px;
  opacity: 0.9;
}

.wordmark .dot {
  color: var(--vermillion);
}

.sealed-prompt {
  font-weight: 300;
  font-size: 15px;
  color: rgba(255, 255, 255, 0.4);
  margin-bottom: 20px;
  letter-spacing: 0.02em;
}

/* ── Card container (3D) ── */

.card-container {
  perspective: 1200px;
  width: min(380px, calc(100vw - 48px));
  height: min(260px, 45vh);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.card {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-front {
  background: var(--warm-ground);
  box-shadow: var(--card-shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-front-watermark {
  font-family: 'Comico', serif;
  font-size: 64px;
  color: rgba(26, 26, 22, 0.06);
  letter-spacing: -0.03em;
  user-select: none;
}

.card-front-watermark .dot {
  color: rgba(235, 65, 1, 0.12);
}

.card-front-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: var(--vermillion);
  border-radius: 50%;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.6;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.012); }
}

.card-container:not(.opened) .card {
  animation: breathe 3.5s ease-in-out infinite;
}

.card-container.opened .card {
  animation: none;
}

.card-back {
  background: var(--warm-ground);
  box-shadow: var(--card-shadow);
  transform: rotateY(180deg);
}

.tap-hint {
  font-weight: 300;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.25);
  margin-top: 24px;
  letter-spacing: 0.02em;
}

/* ═══ STATE 2: the letter ═══ */

.letter {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.letter.visible {
  opacity: 1;
  pointer-events: auto;
}

.letter-inner {
  max-width: 420px;
  width: 100%;
}

.letter-mark {
  font-weight: 400;
  font-size: 22px;
  color: var(--faded);
  margin-bottom: 56px;
  opacity: 0;
  letter-spacing: 0.02em;
}
.letter-mark.typed { opacity: 1; }

.line {
  font-weight: 300;
  font-size: clamp(16px, 4.2vw, 19px);
  line-height: 1.85;
  color: var(--faded);
  opacity: 0;
  display: block;
  overflow: hidden;
}
.line.typed { opacity: 1; }

.line.break {
  height: 28px;
}

.line.italic {
  font-style: italic;
  color: rgba(255,255,255,0.45);
}

.code-row {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  margin-top: 48px;
  margin-bottom: 12px;
  opacity: 0;
}
.code-row.typed { opacity: 1; }

.code-label {
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.3);
  text-transform: lowercase;
  white-space: nowrap;
}

.code-value {
  font-family: 'Comico', serif;
  font-size: clamp(32px, 10vw, 48px);
  letter-spacing: 0.25em;
  color: var(--ember);
  text-shadow: 0 0 32px rgba(196,98,45,0.4), 0 0 64px rgba(196,98,45,0.15);
  font-weight: 400;
}

.enter-row {
  margin-top: 40px;
  opacity: 0;
}
.enter-row.typed { opacity: 1; }

.enter-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.08em;
  color: var(--ember);
  text-decoration: none;
  text-transform: lowercase;
  padding: 14px 0;
  border-bottom: 1px solid rgba(196,98,45,0.3);
  transition: border-color 0.3s ease, color 0.3s ease;
}
.enter-link:hover {
  border-color: var(--ember);
}
.enter-link svg {
  width: 16px;
  height: 16px;
  transition: transform 0.3s ease;
}
.enter-link:hover svg {
  transform: translateX(4px);
}

.cursor {
  display: inline-block;
  width: 1px;
  height: 1.1em;
  background: var(--faded);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

@media (max-height: 700px) {
  .letter { padding: 32px 24px; }
  .letter-mark { margin-bottom: 36px; }
  .line.break { height: 20px; }
  .code-row { margin-top: 36px; }
  .enter-row { margin-top: 32px; }
}
</style>
</head>
<body>

<!-- ═══ STATE 1: Envelope card ═══ -->
<div class="scene" id="sealedScene">
  <div class="wordmark">ohm<span class="dot">.</span></div>
  <p class="sealed-prompt">this is for you</p>
  <div class="card-container" id="cardContainer">
    <div class="card" id="card">
      <div class="card-front">
        <span class="card-front-watermark">ohm<span class="dot">.</span></span>
        <span class="card-front-dot"></span>
      </div>
      <div class="card-back"></div>
    </div>
  </div>
  <p class="tap-hint">tap to open</p>
</div>

<!-- ═══ STATE 2: The letter ═══ -->
<div class="letter" id="letter">
  <div class="letter-inner" id="letterInner">

    <div class="letter-mark" id="mark">ohm.</div>

    <span class="line" data-text="not everyone needs another platform."></span>
    <span class="line" data-text="some people need a different kind of room."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="a quieter one."></span>
    <span class="line italic" data-text="a sharper one."></span>
    <span class="line italic" data-text="a place where people are not reduced to"></span>
    <span class="line italic" data-text="titles, bios, or categories too quickly."></span>

    <span class="line break"></span>

    <span class="line" data-text="we care less about what you do"></span>
    <span class="line" data-text="and more about the questions"></span>
    <span class="line" data-text="that keep returning to you."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="the unfinished thoughts."></span>
    <span class="line italic" data-text="the private obsessions."></span>
    <span class="line italic" data-text="the ideas still looking for their counterpart."></span>

    <span class="line break"></span>

    <span class="line" data-text="ohm. is a space for minds in motion."></span>
    <span class="line" data-text="and yours came to mind."></span>

    <span class="line break"></span>

    <span class="line" data-text="we are opening this slowly,"></span>
    <span class="line" data-text="with a small number of invitations."></span>

    <span class="line break"></span>

    <span class="line" data-text="if this speaks to you, step inside."></span>

    <div class="code-row" id="codeRow">
      <span class="code-label">invitation code</span>
      <span class="code-value" id="codeValue"></span>
    </div>

    <div class="enter-row" id="enterRow">
      <a class="enter-link" href="https://apps.apple.com/us/app/ohm/id6760516231">
        enter
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>
</div>

<script>
(function () {
  var cardEl = document.getElementById('card');
  var cardContainer = document.getElementById('cardContainer');
  var sealedScene = document.getElementById('sealedScene');
  var letter = document.getElementById('letter');
  var mark = document.getElementById('mark');
  var lines = document.querySelectorAll('.line[data-text]');
  var codeRow = document.getElementById('codeRow');
  var codeValue = document.getElementById('codeValue');
  var enterRow = document.getElementById('enterRow');
  var opened = false;

  var CHAR_SPEED = 18;
  var LINE_PAUSE = 100;
  var BREAK_PAUSE = 200;
  var CODE_TEXT = 'ohmfam';

  // Envelope card flip → transition to dark letter
  cardContainer.addEventListener('click', function () {
    if (opened) return;
    opened = true;
    cardContainer.classList.add('opened');
    cardEl.classList.add('flipped');

    // After flip, fade out envelope scene → fade in letter
    setTimeout(function () {
      sealedScene.classList.add('hidden');

      setTimeout(function () {
        letter.classList.add('visible');
        document.documentElement.style.overflow = 'auto';
        document.body.style.overflow = 'auto';

        // Start the typewriter sequence
        setTimeout(startSequence, 600);
      }, 400);
    }, 650);
  });

  function typeText(element, text, callback) {
    var i = 0;
    element.classList.add('typed');

    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    element.appendChild(cursor);

    function tick() {
      if (i < text.length) {
        var char = document.createTextNode(text[i]);
        element.insertBefore(char, cursor);
        i++;
        setTimeout(tick, CHAR_SPEED + (Math.random() * 18 - 9));
      } else {
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        if (callback) callback();
      }
    }
    tick();
  }

  function startSequence() {
    mark.textContent = '';
    typeText(mark, 'ohm.', function () {
      setTimeout(function () { typeLines(0); }, 500);
    });
  }

  function typeLines(index) {
    if (index >= lines.length) {
      setTimeout(showCode, 400);
      return;
    }

    var line = lines[index];
    var text = line.getAttribute('data-text');

    var prev = line.previousElementSibling;
    var isAfterBreak = prev && prev.classList.contains('break');
    var pause = isAfterBreak ? BREAK_PAUSE : LINE_PAUSE;

    if (isAfterBreak) {
      prev.classList.add('typed');
      prev.style.opacity = '1';
    }

    setTimeout(function () {
      typeText(line, text, function () {
        typeLines(index + 1);
      });
    }, pause);
  }

  function showCode() {
    codeRow.classList.add('typed');

    var i = 0;
    function tickCode() {
      if (i < CODE_TEXT.length) {
        codeValue.textContent += CODE_TEXT[i];
        i++;
        setTimeout(tickCode, 80);
      } else {
        setTimeout(function () {
          enterRow.classList.add('typed');
        }, 500);
      }
    }
    tickCode();
  }
})();
</script>
</body>
</html>
