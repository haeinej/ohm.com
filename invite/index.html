<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>an invitation to wander.</title>

<meta property="og:type" content="website">
<meta property="og:title" content="an invitation to wander.">
<meta property="og:description" content="your mind caught our attention.">
<meta property="og:image" content="https://www.ohmmmm.com/images/og-invite.png">
<meta property="og:url" content="https://www.ohmmmm.com/invite">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="an invitation to wander.">
<meta name="twitter:description" content="your mind caught our attention.">
<meta name="twitter:image" content="https://www.ohmmmm.com/images/og-invite.png">

<style>
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }

:root {
  --ink: #0A0A0A;
  --faded: #D0D0D0;
  --ember: #C4622D;
  --white: #FAFAF8;
  --flap-front: #F0EDE8;
  --flap-back: #E5E0DA;
  --vermillion: #EB4101;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--ink);
  color: var(--faded);
  font-family: 'Sentient', Georgia, serif;
  -webkit-font-smoothing: antialiased;
}

/* Grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
  opacity: 0.03;
  background-image: url('../images/grain.png');
  background-size: 120px 120px;
  background-repeat: repeat;
}

/* ═══════════════════════════════════════
   STATE 1: Envelope
   ═══════════════════════════════════════ */

.scene {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 1s ease;
}
.scene.fading { opacity: 0; pointer-events: none; }

/* Envelope wrapper */
.envelope {
  position: relative;
  width: min(320px, calc(100vw - 64px));
  height: 210px;
}

/* The white body */
.env-body {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 180px;
  background: var(--white);
  border-radius: 4px 4px 12px 12px;
  box-shadow: 0 16px 60px rgba(0,0,0,0.5), 0 2px 10px rgba(0,0,0,0.3);
  z-index: 2;
}

/* Subtle inner shadow on body */
.env-body::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(to bottom, rgba(0,0,0,0.015) 0%, transparent 20%);
  pointer-events: none;
}

/* Flap — hinged at top */
.env-flap-wrap {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 120px;
  z-index: 3;
  perspective: 800px;
}

.env-flap {
  width: 100%;
  height: 100%;
  transform-origin: top center;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.4, 0, 0.15, 1);
}

.env-flap-front,
.env-flap-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
}

.env-flap-front svg,
.env-flap-back svg {
  width: 100%;
  height: 100%;
  display: block;
}

.env-flap-back {
  transform: rotateX(180deg);
}

/* Wax seal */
.wax-seal {
  position: absolute;
  bottom: 112px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
}

.wax-seal-dot {
  width: 40px;
  height: 40px;
  background: var(--vermillion);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 2px 10px rgba(235,65,1,0.35),
    inset 0 1px 2px rgba(255,255,255,0.15);
}

.wax-seal-dot img {
  width: 22px;
  height: 22px;
  filter: brightness(0) invert(1);
  opacity: 0.85;
}

/* Text below envelope */
.scene-label {
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.2);
  margin-top: 36px;
  transition: opacity 0.4s ease;
}

/* Breathing */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.envelope { animation: float 4s ease-in-out infinite; }

/* ─── Opened states ─── */
.scene.opened .envelope { animation: none; }
.scene.opened .env-flap { transform: rotateX(-180deg); }
.scene.opened .wax-seal { opacity: 0; transform: translateX(-50%) scale(0.3); }
.scene.opened .scene-label { opacity: 0; }

/* Card slides up from envelope */
.env-card {
  position: absolute;
  bottom: 10px;
  left: 14px;
  right: 14px;
  height: 155px;
  background: var(--ink);
  border-radius: 6px;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s;
}

.env-card-text {
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.12);
  text-transform: lowercase;
}

.scene.opened .env-card {
  transform: translateY(-240px);
}

/* ═══════════════════════════════════════
   STATE 2: Typewriter letter
   ═══════════════════════════════════════ */

.letter {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 5;
}
.letter.visible { opacity: 1; pointer-events: auto; }

.letter-inner { max-width: 420px; width: 100%; }

.letter-mark {
  font-weight: 400;
  font-size: 22px;
  color: var(--faded);
  margin-bottom: 56px;
  opacity: 0;
  letter-spacing: 0.02em;
}
.letter-mark.typed { opacity: 1; }

.line {
  font-weight: 300;
  font-size: clamp(16px, 4.2vw, 19px);
  line-height: 1.85;
  color: var(--faded);
  opacity: 0;
  display: block;
  overflow: hidden;
}
.line.typed { opacity: 1; }
.line.break { height: 28px; }
.line.italic { font-style: italic; color: rgba(255,255,255,0.45); }

.code-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 48px;
  margin-bottom: 12px;
  opacity: 0;
}
.code-row.typed { opacity: 1; }

.code-label {
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.3);
  text-transform: lowercase;
  white-space: nowrap;
}

.code-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: clamp(22px, 6vw, 30px);
  letter-spacing: 0.2em;
  color: var(--ember);
  text-shadow: 0 0 24px rgba(196,98,45,0.3);
}

.enter-row { margin-top: 40px; opacity: 0; }
.enter-row.typed { opacity: 1; }

.enter-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.08em;
  color: var(--ember);
  text-decoration: none;
  text-transform: lowercase;
  padding: 14px 0;
  border-bottom: 1px solid rgba(196,98,45,0.3);
  transition: border-color 0.3s ease;
}
.enter-link:hover { border-color: var(--ember); }
.enter-link svg { width: 16px; height: 16px; transition: transform 0.3s ease; }
.enter-link:hover svg { transform: translateX(4px); }

.cursor {
  display: inline-block;
  width: 1px;
  height: 1.1em;
  background: var(--faded);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

@media (max-height: 700px) {
  .letter { padding: 32px 24px; }
  .letter-mark { margin-bottom: 36px; }
  .line.break { height: 20px; }
  .code-row { margin-top: 36px; }
  .enter-row { margin-top: 32px; }
}
</style>
</head>
<body>

<!-- ═══ STATE 1: Envelope ═══ -->
<div class="scene" id="scene">
  <div class="envelope">
    <!-- Dark card behind envelope body (slides up when opened) -->
    <div class="env-card">
      <span class="env-card-text">an invitation to wander</span>
    </div>
    <!-- White envelope body -->
    <div class="env-body"></div>
    <!-- Flap -->
    <div class="env-flap-wrap">
      <div class="env-flap">
        <div class="env-flap-front">
          <svg viewBox="0 0 320 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 L160,120 L320,0 Z" fill="#F0EDE8"/>
          </svg>
        </div>
        <div class="env-flap-back">
          <svg viewBox="0 0 320 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 L160,120 L320,0 Z" fill="#E5E0DA"/>
          </svg>
        </div>
      </div>
    </div>
    <!-- Wax seal -->
    <div class="wax-seal">
      <div class="wax-seal-dot">
        <img src="../images/logo_nobackground.png" alt="">
      </div>
    </div>
  </div>
  <p class="scene-label">we invite you to ohm.</p>
</div>

<!-- ═══ STATE 2: The letter ═══ -->
<div class="letter" id="letter">
  <div class="letter-inner">

    <div class="letter-mark" id="mark">ohm.</div>

    <span class="line" data-text="not everyone needs another platform."></span>
    <span class="line" data-text="some people need a different kind of room."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="a quieter one."></span>
    <span class="line italic" data-text="a sharper one."></span>
    <span class="line italic" data-text="a place where people are not reduced to"></span>
    <span class="line italic" data-text="titles, bios, or categories too quickly."></span>

    <span class="line break"></span>

    <span class="line" data-text="we care less about what you do"></span>
    <span class="line" data-text="and more about the questions"></span>
    <span class="line" data-text="that keep returning to you."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="the unfinished thoughts."></span>
    <span class="line italic" data-text="the private obsessions."></span>
    <span class="line italic" data-text="the ideas still looking for their counterpart."></span>

    <span class="line break"></span>

    <span class="line" data-text="ohm. is a space for minds in motion."></span>
    <span class="line" data-text="and yours came to mind."></span>

    <span class="line break"></span>

    <span class="line" data-text="we are opening this slowly,"></span>
    <span class="line" data-text="with a small number of invitations."></span>

    <span class="line break"></span>

    <span class="line" data-text="if this speaks to you, step inside."></span>

    <div class="code-row" id="codeRow">
      <span class="code-label">invitation code</span>
      <span class="code-value" id="codeValue"></span>
    </div>

    <div class="enter-row" id="enterRow">
      <a class="enter-link" href="https://apps.apple.com/us/app/ohm/id6760516231">
        enter
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>
</div>

<script>
(function () {
  var scene = document.getElementById('scene');
  var letter = document.getElementById('letter');
  var mark = document.getElementById('mark');
  var lines = document.querySelectorAll('.line[data-text]');
  var codeRow = document.getElementById('codeRow');
  var codeValue = document.getElementById('codeValue');
  var enterRow = document.getElementById('enterRow');
  var opened = false;

  var CHAR_SPEED = 32;
  var LINE_PAUSE = 180;
  var BREAK_PAUSE = 350;
  var CODE_TEXT = 'ohmfam';

  scene.addEventListener('click', function () {
    if (opened) return;
    opened = true;

    // 1. Open flap + seal breaks + card rises
    scene.classList.add('opened');

    // 2. After card rises, fade the whole scene out
    setTimeout(function () {
      scene.classList.add('fading');
    }, 1800);

    // 3. Show the letter
    setTimeout(function () {
      letter.classList.add('visible');
      document.documentElement.style.overflow = 'auto';
      document.body.style.overflow = 'auto';
      setTimeout(startSequence, 600);
    }, 2400);
  });

  function typeText(el, text, cb) {
    var i = 0;
    el.classList.add('typed');
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);

    function tick() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        setTimeout(tick, CHAR_SPEED + (Math.random() * 18 - 9));
      } else {
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        if (cb) cb();
      }
    }
    tick();
  }

  function startSequence() {
    mark.textContent = '';
    typeText(mark, 'ohm.', function () {
      setTimeout(function () { typeLines(0); }, 500);
    });
  }

  function typeLines(idx) {
    if (idx >= lines.length) { setTimeout(showCode, 400); return; }
    var line = lines[idx];
    var text = line.getAttribute('data-text');
    var prev = line.previousElementSibling;
    var afterBreak = prev && prev.classList.contains('break');
    if (afterBreak) { prev.classList.add('typed'); prev.style.opacity = '1'; }
    setTimeout(function () {
      typeText(line, text, function () { typeLines(idx + 1); });
    }, afterBreak ? BREAK_PAUSE : LINE_PAUSE);
  }

  function showCode() {
    codeRow.classList.add('typed');
    var i = 0;
    function tick() {
      if (i < CODE_TEXT.length) {
        codeValue.textContent += CODE_TEXT[i]; i++;
        setTimeout(tick, 80);
      } else {
        setTimeout(function () { enterRow.classList.add('typed'); }, 500);
      }
    }
    tick();
  }
})();
</script>
</body>
</html>
