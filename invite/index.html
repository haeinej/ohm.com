<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>an invitation to wander.</title>

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="an invitation to wander.">
<meta property="og:description" content="your mind caught our attention.">
<meta property="og:image" content="https://www.ohmmmm.com/images/og-invite.png">
<meta property="og:url" content="https://www.ohmmmm.com/invite">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="an invitation to wander.">
<meta name="twitter:description" content="your mind caught our attention.">
<meta name="twitter:image" content="https://www.ohmmmm.com/images/og-invite.png">

<style>
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
@font-face { font-family: 'Sentient'; src: url('../Fonts/OTF/Sentient-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }

:root {
  --ink: #0A0A0A;
  --faded: #D0D0D0;
  --muted: rgba(255,255,255,0.25);
  --ember: #C4622D;
  --envelope: #EDE8E2;
  --envelope-dark: #D8D2CA;
  --envelope-shadow: #E8E3DC;
  --vermillion: #EB4101;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--ink);
  color: var(--faded);
  font-family: 'Sentient', Georgia, serif;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* ─── Grain overlay ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.035;
  background-image: url('../images/grain.png');
  background-size: 120px 120px;
  background-repeat: repeat;
}

/* ═══════════════════════════════════════
   STATE 1: Sealed envelope
   ═══════════════════════════════════════ */

.scene {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 10;
  transition: opacity 0.8s ease;
}
.scene.hidden { opacity: 0; pointer-events: none; }

.scene-prompt {
  font-weight: 300;
  font-style: italic;
  font-size: 15px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 32px;
  letter-spacing: 0.03em;
}

/* ─── Envelope ─── */

.envelope {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  width: min(340px, calc(100vw - 56px));
  position: relative;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.005); }
}
.envelope:not(.opened) { animation: breathe 4s ease-in-out infinite; }
.envelope.opened { animation: none; }

/* Envelope body */
.env-body {
  width: 100%;
  height: 190px;
  background: var(--envelope);
  border-radius: 3px 3px 8px 8px;
  position: relative;
  box-shadow: 0 12px 48px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.25);
  overflow: hidden;
  z-index: 1;
}

.env-body::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.02) 0%, transparent 30%),
    linear-gradient(225deg, rgba(0,0,0,0.02) 0%, transparent 30%),
    linear-gradient(to top, rgba(0,0,0,0.015) 0%, transparent 40%);
  pointer-events: none;
}

/* Card peeking inside */
.env-card {
  position: absolute;
  top: 12px; left: 16px; right: 16px; bottom: 16px;
  background: var(--ink);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.env-card-text {
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.15);
  text-transform: lowercase;
}

/* Card rises out when opened */
.envelope.opened .env-card {
  transform: translateY(-220px);
  opacity: 0;
  transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.4s, opacity 0.4s ease 1s;
}

/* Crease */
.env-crease {
  position: absolute;
  top: 12px; bottom: 16px;
  left: 50%; width: 1px;
  background: rgba(0,0,0,0.02);
  z-index: 2;
}

/* ─── Flap ─── */

.env-flap-wrapper {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 110px;
  z-index: 3;
  perspective: 600px;
}

.env-flap {
  width: 100%;
  height: 100%;
  transform-origin: top center;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.15, 1);
}

.env-flap-front {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
}

.env-flap-front svg {
  width: 100%;
  height: 100%;
  display: block;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.06));
}

.env-flap-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  transform: rotateX(180deg);
}

.env-flap-back svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* Wax seal */
.wax-seal {
  position: absolute;
  top: 54px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.wax-seal-inner {
  width: 44px;
  height: 44px;
  background: var(--vermillion);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 3px 12px rgba(235,65,1,0.35),
    inset 0 1px 3px rgba(255,255,255,0.15),
    inset 0 -1px 2px rgba(0,0,0,0.1);
}

.wax-seal-img {
  width: 24px;
  height: 24px;
  filter: brightness(0) invert(1);
  opacity: 0.85;
}

/* Opened state */
.envelope.opened .env-flap {
  transform: rotateX(-180deg);
}
.envelope.opened .wax-seal {
  opacity: 0;
  transform: translateX(-50%) scale(0.2);
}

.tap-hint {
  font-weight: 300;
  font-size: 12px;
  color: rgba(255,255,255,0.15);
  margin-top: 28px;
  letter-spacing: 0.06em;
}

/* ═══════════════════════════════════════
   STATE 2: The typewriter letter
   ═══════════════════════════════════════ */

.letter {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 5;
}
.letter.visible {
  opacity: 1;
  pointer-events: auto;
}

.letter-inner {
  max-width: 420px;
  width: 100%;
}

/* ohm. mark */
.letter-mark {
  font-weight: 400;
  font-size: 22px;
  color: var(--faded);
  margin-bottom: 56px;
  opacity: 0;
  letter-spacing: 0.02em;
}
.letter-mark.typed { opacity: 1; }

/* Each line */
.line {
  font-weight: 300;
  font-size: clamp(16px, 4.2vw, 19px);
  line-height: 1.85;
  color: var(--faded);
  opacity: 0;
  display: block;
  overflow: hidden;
}
.line.typed { opacity: 1; }

.line.break { height: 28px; }

.line.italic {
  font-style: italic;
  color: rgba(255,255,255,0.45);
}

/* Code */
.code-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 48px;
  margin-bottom: 12px;
  opacity: 0;
}
.code-row.typed { opacity: 1; }

.code-label {
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.3);
  text-transform: lowercase;
  white-space: nowrap;
}

.code-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: clamp(22px, 6vw, 30px);
  letter-spacing: 0.2em;
  color: var(--ember);
  text-shadow: 0 0 24px rgba(196,98,45,0.3);
}

/* Enter */
.enter-row {
  margin-top: 40px;
  opacity: 0;
}
.enter-row.typed { opacity: 1; }

.enter-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.08em;
  color: var(--ember);
  text-decoration: none;
  text-transform: lowercase;
  padding: 14px 0;
  border-bottom: 1px solid rgba(196,98,45,0.3);
  transition: border-color 0.3s ease;
}
.enter-link:hover { border-color: var(--ember); }
.enter-link svg {
  width: 16px; height: 16px;
  transition: transform 0.3s ease;
}
.enter-link:hover svg { transform: translateX(4px); }

/* Cursor */
.cursor {
  display: inline-block;
  width: 1px;
  height: 1.1em;
  background: var(--faded);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Responsive */
@media (max-height: 700px) {
  .letter { padding: 32px 24px; }
  .letter-mark { margin-bottom: 36px; }
  .line.break { height: 20px; }
  .code-row { margin-top: 36px; }
  .enter-row { margin-top: 32px; }
}
</style>
</head>
<body>

<!-- ═══ STATE 1: Sealed envelope ═══ -->
<div class="scene" id="scene">
  <p class="scene-prompt">this is for you</p>
  <div class="envelope" id="envelope">
    <!-- Body -->
    <div class="env-body">
      <div class="env-card">
        <span class="env-card-text">an invitation to wander</span>
      </div>
      <div class="env-crease"></div>
    </div>
    <!-- Flap -->
    <div class="env-flap-wrapper">
      <div class="env-flap">
        <div class="env-flap-front">
          <svg viewBox="0 0 340 110" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="fg" x1="0.5" y1="1" x2="0.5" y2="0">
                <stop offset="0%" stop-color="#E8E3DC"/>
                <stop offset="100%" stop-color="#DDD7CF"/>
              </linearGradient>
            </defs>
            <path d="M0,0 L170,110 L340,0 Z" fill="url(#fg)"/>
          </svg>
        </div>
        <div class="env-flap-back">
          <svg viewBox="0 0 340 110" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 L170,110 L340,0 Z" fill="#D8D2CA"/>
          </svg>
        </div>
      </div>
    </div>
    <!-- Wax seal -->
    <div class="wax-seal">
      <div class="wax-seal-inner">
        <img class="wax-seal-img" src="../images/logo_nobackground.png" alt="">
      </div>
    </div>
  </div>
  <p class="tap-hint">tap to open</p>
</div>

<!-- ═══ STATE 2: The letter ═══ -->
<div class="letter" id="letter">
  <div class="letter-inner" id="letterInner">

    <div class="letter-mark" id="mark">ohm.</div>

    <span class="line" data-text="not everyone needs another platform."></span>
    <span class="line" data-text="some people need a different kind of room."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="a quieter one."></span>
    <span class="line italic" data-text="a sharper one."></span>
    <span class="line italic" data-text="a place where people are not reduced to"></span>
    <span class="line italic" data-text="titles, bios, or categories too quickly."></span>

    <span class="line break"></span>

    <span class="line" data-text="we care less about what you do"></span>
    <span class="line" data-text="and more about the questions"></span>
    <span class="line" data-text="that keep returning to you."></span>

    <span class="line break"></span>

    <span class="line italic" data-text="the unfinished thoughts."></span>
    <span class="line italic" data-text="the private obsessions."></span>
    <span class="line italic" data-text="the ideas still looking for their counterpart."></span>

    <span class="line break"></span>

    <span class="line" data-text="ohm. is a space for minds in motion."></span>
    <span class="line" data-text="and yours came to mind."></span>

    <span class="line break"></span>

    <span class="line" data-text="we are opening this slowly,"></span>
    <span class="line" data-text="with a small number of invitations."></span>

    <span class="line break"></span>

    <span class="line" data-text="if this speaks to you, step inside."></span>

    <div class="code-row" id="codeRow">
      <span class="code-label">invitation code</span>
      <span class="code-value" id="codeValue"></span>
    </div>

    <div class="enter-row" id="enterRow">
      <a class="enter-link" href="https://apps.apple.com/us/app/ohm/id6760516231">
        enter
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>
</div>

<script>
(function () {
  var envelope = document.getElementById('envelope');
  var scene = document.getElementById('scene');
  var letter = document.getElementById('letter');
  var mark = document.getElementById('mark');
  var lines = document.querySelectorAll('.line[data-text]');
  var codeRow = document.getElementById('codeRow');
  var codeValue = document.getElementById('codeValue');
  var enterRow = document.getElementById('enterRow');
  var opened = false;

  var CHAR_SPEED = 32;
  var LINE_PAUSE = 180;
  var BREAK_PAUSE = 350;
  var CODE_TEXT = 'ohmfam';

  // STATE 1 → tap envelope
  envelope.addEventListener('click', function () {
    if (opened) return;
    opened = true;

    // Open the flap, break the seal, card rises out
    envelope.classList.add('opened');

    // After card animation, fade to the letter
    setTimeout(function () {
      scene.classList.add('hidden');

      setTimeout(function () {
        letter.classList.add('visible');
        document.documentElement.style.overflow = 'auto';
        document.body.style.overflow = 'auto';

        // Start typewriter
        setTimeout(startSequence, 600);
      }, 400);
    }, 1400);
  });

  // ─── Typewriter engine ───

  function typeText(element, text, callback) {
    var i = 0;
    element.classList.add('typed');

    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    element.appendChild(cursor);

    function tick() {
      if (i < text.length) {
        var ch = document.createTextNode(text[i]);
        element.insertBefore(ch, cursor);
        i++;
        setTimeout(tick, CHAR_SPEED + (Math.random() * 18 - 9));
      } else {
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        if (callback) callback();
      }
    }
    tick();
  }

  function startSequence() {
    mark.textContent = '';
    typeText(mark, 'ohm.', function () {
      setTimeout(function () { typeLines(0); }, 500);
    });
  }

  function typeLines(index) {
    if (index >= lines.length) {
      setTimeout(showCode, 400);
      return;
    }

    var line = lines[index];
    var text = line.getAttribute('data-text');

    var prev = line.previousElementSibling;
    var isAfterBreak = prev && prev.classList.contains('break');
    var pause = isAfterBreak ? BREAK_PAUSE : LINE_PAUSE;

    if (isAfterBreak) {
      prev.classList.add('typed');
      prev.style.opacity = '1';
    }

    setTimeout(function () {
      typeText(line, text, function () {
        typeLines(index + 1);
      });
    }, pause);
  }

  function showCode() {
    codeRow.classList.add('typed');
    var i = 0;
    function tickCode() {
      if (i < CODE_TEXT.length) {
        codeValue.textContent += CODE_TEXT[i];
        i++;
        setTimeout(tickCode, 80);
      } else {
        setTimeout(function () {
          enterRow.classList.add('typed');
        }, 500);
      }
    }
    tickCode();
  }
})();
</script>
</body>
</html>
